<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — Necho</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body data-page="signin">

<!-- ===== NAV ===== -->
<nav id="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="index.html"><img class="nav-logo-img" src="logo.svg" alt="Necho"/><span class="logo-name">NECHO</span></a>
    <div class="nav-links">
      <a class="nav-link" data-page="home"        href="index.html">HOME</a>
      <a class="nav-link" data-page="interpreter" href="interpreter.html">INTERPRETER</a>
      <a class="nav-link" data-page="about"       href="about.html">ABOUT US</a>
      <a class="nav-link" data-page="blog"        href="blog.html">BLOG</a>
    </div>
    <div class="nav-actions">
      <div class="lang-wrap">
        <div class="lang-btn"><span id="lang-label">ENGLISH</span><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
        <select id="lang-select" class="lang-select" onchange="changeLanguage(this.value)"><option value="en">English</option><option value="hi">Hindi</option><option value="ta">Tamil</option><option value="te">Telugu</option><option value="kn">Kannada</option><option value="ml">Malayalam</option><option value="mr">Marathi</option><option value="gu">Gujarati</option></select>
      </div>
      <div class="acc-wrap">
        <button class="acc-toggle" onclick="toggleAccPanel()"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="4" r="1"/><path d="M6.2 8.5a10 10 0 0 1 11.6 0M12 6v5m0 0l-3 5m3-5l3 5"/></svg></button>
        <div id="acc-panel" class="acc-panel">
          <div class="acc-panel-head"><span class="acc-panel-title">Inclusive Settings</span><button class="acc-x" onclick="toggleAccPanel()"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
          <button id="acc-gray"     class="acc-opt" onclick="toggleAcc('gray')">Grayscale<div class="acc-dot"></div></button>
          <button id="acc-contrast" class="acc-opt" onclick="toggleAcc('contrast')">High Contrast<div class="acc-dot"></div></button>
          <button id="acc-motion"   class="acc-opt" onclick="toggleAcc('motion')">Reduced Motion<div class="acc-dot"></div></button>
          <button id="acc-lineh"    class="acc-opt" onclick="toggleAcc('lineh')">Relaxed Spacing<div class="acc-dot"></div></button>
          <button id="acc-wordsp"   class="acc-opt" onclick="toggleAcc('wordsp')">Word Spacing<div class="acc-dot"></div></button>
        </div>
      </div>
      <button class="hamburger" onclick="toggleMob()"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    </div>
  </div>
</nav>
<div id="mob-menu">
  <button class="mob-close" onclick="toggleMob()"><svg width="32" height="32" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  <a class="mob-link" data-page="home"        href="index.html">HOME</a>
  <a class="mob-link" data-page="interpreter" href="interpreter.html">INTERPRETER</a>
  <a class="mob-link" data-page="about"       href="about.html">ABOUT US</a>
  <a class="mob-link" data-page="blog"        href="blog.html">BLOG</a>
</div>

<!-- ===== CONTENT ===== -->
<main class="auth-main">
  <div class="auth-card fade-up">
    <h1>Sign in</h1>
    <p class="auth-sub">Welcome back to your dashboard.</p>

    <form class="auth-form" onsubmit="handleSignIn(event)">
      <div>
        <label class="form-label">Email</label>
        <input class="form-line" type="email" placeholder="email@example.com" required/>
      </div>
      <div>
        <label class="form-label">Secure Credential</label>
        <input class="form-line" type="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-inv auth-submit">SIGN IN</button>
    </form>

    <div class="auth-toggle">
      <a class="auth-switch" href="signup.html">New to Necho? Sign up</a>
    </div>
  </div>
</main>

<button id="theme-btn" onclick="toggleTheme()">
  <svg id="icon-sun" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  <svg id="icon-moon" style="display:none" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
</button>
<script src="nav.js"></script>
<script>
  function handleSignIn(e) {
    e.preventDefault();
    login();
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
