<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Sign In - Necho</title>
  <link rel="stylesheet" href="tailwind-gen.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" /></noscript>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>

<body data-page="signin">

  <nav id="nav">
    <div class="nav-inner">
      <a class="nav-logo" href="index.html"><img class="nav-logo-img" src="logo.svg" alt="Necho" /></a>
      <div class="nav-links">
        <a class="nav-link" data-page="home" href="index.html">HOME</a>
        <a class="nav-link interp-gate" data-page="interpreter" href="interpreter.html">INTERPRETER</a>
        <a class="nav-link" data-page="about" href="about.html">ABOUT US</a>
        <a class="nav-link" data-page="blog" href="blog.html">BLOG</a>
      </div>
      <div class="nav-actions">
        <div class="lang-wrap">
          <div class="lang-btn"><span id="lang-label">ENGLISH</span><svg width="14" height="14" fill="none"
              stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <polyline points="6 9 12 15 18 9" />
            </svg></div>
          <select id="lang-select" class="lang-select" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="ta">Tamil</option>
            <option value="te">Telugu</option>
            <option value="kn">Kannada</option>
            <option value="ml">Malayalam</option>
            <option value="mr">Marathi</option>
            <option value="gu">Gujarati</option>
          </select>
        </div>
        <div class="acc-wrap">
          <button class="acc-toggle" onclick="toggleAccPanel()"><svg width="20" height="20" fill="none"
              stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="4" r="1" />
              <path d="M6.2 8.5a10 10 0 0 1 11.6 0M12 6v5m0 0l-3 5m3-5l3 5" />
            </svg></button>
          <div id="acc-panel" class="acc-panel">
            <div class="acc-panel-head"><span class="acc-panel-title">Inclusive Settings</span><button class="acc-x"
                onclick="toggleAccPanel()"><svg width="16" height="16" fill="none" stroke="currentColor"
                  stroke-width="2" viewBox="0 0 24 24">
                  <line x1="18" y1="6" x2="6" y2="18" />
                  <line x1="6" y1="6" x2="18" y2="18" />
                </svg></button></div>
            <button id="acc-gray" class="acc-opt" onclick="toggleAcc('gray')">Grayscale<div class="acc-dot"></div>
            </button>
            <button id="acc-contrast" class="acc-opt" onclick="toggleAcc('contrast')">High Contrast<div class="acc-dot">
              </div></button>
            <button id="acc-motion" class="acc-opt" onclick="toggleAcc('motion')">Reduced Motion<div class="acc-dot">
              </div></button>
            <button id="acc-lineh" class="acc-opt" onclick="toggleAcc('lineh')">Relaxed Spacing<div class="acc-dot">
              </div></button>
            <button id="acc-wordsp" class="acc-opt" onclick="toggleAcc('wordsp')">Word Spacing<div class="acc-dot">
              </div></button>
          </div>
        </div>
        <button id="nav-profile" onclick="toggleProfilePanel()" title="Profile" style="display:none">
          <span id="nav-profile-initial">U</span>
        </button>
        <button class="hamburger" onclick="toggleMob()"><svg width="24" height="24" fill="none" stroke="currentColor"
            stroke-width="2" viewBox="0 0 24 24">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg></button>
      </div>
    </div>
  </nav>
  <div id="mob-menu">
    <button class="mob-close" onclick="toggleMob()"><svg width="32" height="32" fill="none" stroke="white"
        stroke-width="2" viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg></button>
    <a class="mob-link" data-page="home" href="index.html">HOME</a>
    <a class="mob-link interp-gate" data-page="interpreter" href="interpreter.html">INTERPRETER</a>
    <a class="mob-link" data-page="about" href="about.html">ABOUT US</a>
    <a class="mob-link" data-page="blog" href="blog.html">BLOG</a>
  </div>

  <main class="auth-full-screen">
    <div class="auth-container">

      <div class="auth-hero">
        <div class="auth-strips">
          <div class="auth-strip"></div>
          <div class="auth-strip"></div>
          <div class="auth-strip"></div>
          <div class="auth-strip"></div>
          <div class="auth-strip"></div>
          <div class="auth-strip"></div>
        </div>
        <div class="auth-orb-orange"></div>
        <div class="auth-orb-white"></div>

        <h1 class="auth-hero-title">
          The sound of silence,<br />translated for<br />the world.
        </h1>
      </div>

      <div class="auth-form-side">
        <div class="auth-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-sun-icon">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" />
            <path d="M12 20v2" />
            <path d="m4.93 4.93 1.41 1.41" />
            <path d="m17.66 17.66 1.41 1.41" />
            <path d="M2 12h2" />
            <path d="M22 12h2" />
            <path d="m6.34 17.66-1.41 1.41" />
            <path d="m19.07 4.93-1.41 1.41" />
          </svg>
        </div>

        <h2>Welcome Back</h2>
        <p>Login to continue your journey with Necho.</p>

        <form id="signin-form" noValidate>
          <div class="form-group">
            <label for="signin-email" class="form-label-new">Email address</label>
            <input type="email" id="signin-email" placeholder="hi@necho.ai" class="form-input-new" required />
          </div>

          <div class="form-group">
            <label for="signin-password" class="form-label-new">Password</label>
            <div class="input-wrap">
              <input type="password" id="signin-password" placeholder="••••••••" class="form-input-new" required />
              <button type="button" class="pass-toggle" onclick="togglePass('signin-password', this)" tabindex="-1" aria-label="Toggle password visibility">
                <svg class="eye-show" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-hide" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <p id="auth-error" class="auth-error-new" style="margin-bottom:1rem;"></p>

          <button id="signin-btn" type="submit" class="form-btn-new">
            Sign in to Dashboard
          </button>

          <div class="auth-footer-new">
            New to Necho?
            <a href="signup.html">Create an account</a>
          </div>
        </form>
      </div>

    </div>
  </main>

  <script src="nav.js"></script>
  <script type="module" src="firebase-nav.js"></script>
  <script type="module" src="signin-page.js"></script>
</body>

</html>
